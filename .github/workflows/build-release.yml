name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          npm run make
          echo "ASSET_PATH=out/make" >> $GITHUB_ENV

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run make
          echo "ASSET_PATH=out/make" >> $GITHUB_ENV

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm run make
          echo "ASSET_PATH=out/make" >> $Env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipforge-${{ matrix.os }}
          path: out/make/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            clipforge-macos-latest/**/*
            clipforge-ubuntu-latest/**/*
            clipforge-windows-latest/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
